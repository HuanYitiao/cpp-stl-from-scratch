name: CI
 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
 
jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-18
            cxx: clang++-18
 
    runs-on: ubuntu-24.04
    name: ${{ matrix.compiler }}
 
    steps:
      - uses: actions/checkout@v5
 
      - name: Install Clang
        if: matrix.compiler == 'clang'
        run: sudo apt-get update && sudo apt-get install -y clang-18
 
      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug
 
      - name: Build
        run: cmake --build build -j$(nproc)
 
      - name: Test
        run: ctest --test-dir build --output-on-failure
 
